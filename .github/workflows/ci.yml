name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-test-train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 src tests --max-line-length=120 --extend-ignore=E203,W503

      - name: Download dataset
        run: python -m src.download_data

      - name: Train model
        run: python -m src.train

      - name: Run unit tests
        run: pytest --maxfail=1 --disable-warnings --cov=src --cov-report=xml

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/heart_disease_model.joblib
            reports/metrics.json

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    needs: lint-test-train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: heart-disease-api:${{ github.sha }}
          load: true

      - name: Smoke test container
        run: |
          docker run -d --rm -p 8000:8000 --name heart-api heart-disease-api:${{ github.sha }}
          for i in {1..15}; do
            if curl -sf http://localhost:8000/health; then break; fi
            sleep 2
          done
          curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":63,"sex":1,"cp":3,"trestbps":145,"chol":233,"fbs":1,"restecg":0,"thalach":150,"exang":0,"oldpeak":2.3,"slope":0,"ca":0,"thal":1}'
          docker stop heart-api
